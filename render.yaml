services:
  # Backend (FastAPI)
  - type: web
    name: asistente-medico-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false # Debe configurarse en el dashboard de Render
      - key: GROQ_API_KEY
        sync: false # Debe configurarse en el dashboard de Render
      - key: ADMIN_EMAIL
        sync: false # Debe configurarse en el dashboard de Render
      - key: ADMIN_PASSWORD
        sync: false # Debe configurarse en el dashboard de Render

  # Frontend (React/Vite)
  - type: web
    name: asistente-medico-app
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: asistente-medico-api
          envVarKey: RENDER_EXTERNAL_URL
